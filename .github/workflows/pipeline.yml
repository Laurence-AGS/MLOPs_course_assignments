name: MLOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: pip install flake8

      - name: Run linter
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  train:
    needs: linter
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull dataset with DVC
        run: dvc pull --force || echo "DVC pull failed, but continuing simulation"

      - name: Train and log model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python train.py --csv-path mnist.csv

      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model_info
          path: model_info.txt

      - name: Upload MLflow tracking data
        uses: actions/upload-artifact@v4
        with:
          name: mlflow_data
          path: |
            mlruns
            mlflow.db
          if-no-files-found: ignore


      - name: Capture error logs on failure
        if: failure()
        run: |
          echo "=== TRAIN JOB FAILURE REPORT ===" > error_logs.txt
          echo "Timestamp: $(date -u)" >> error_logs.txt
          echo "Branch: ${{ github.ref }}" >> error_logs.txt
          echo "Commit: ${{ github.sha }}" >> error_logs.txt
          echo "Commit Message: ${{ github.event.head_commit.message }}" >> error_logs.txt
          echo "" >> error_logs.txt
          echo "=== Environment ===" >> error_logs.txt
          python --version >> error_logs.txt 2>&1
          pip freeze >> error_logs.txt 2>&1
          echo "" >> error_logs.txt
          echo "Review the step logs above for the full stack trace." >> error_logs.txt

      - name: Upload error logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error_logs
          path: error_logs.txt


      - name: Cleanup temporary cloud volumes
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."

  deploy:
    needs: train
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model_info
          path: .

      - name: Download MLflow tracking data
        uses: actions/download-artifact@v4
        with:
          name: mlflow_data
          path: .

      - name: Check model performance
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python check_threshold.py

      - name: Mock Docker build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
