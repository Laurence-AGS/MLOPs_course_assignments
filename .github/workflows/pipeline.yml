name: MLOps Pipeline

on:
  push:
    branches: [ test-ci ]

jobs:

  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull dataset with DVC
        run: dvc pull --force || echo "DVC pull failed, but continuing simulation"

      - name: Train and log model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python train.py --csv-path mnist.csv --epochs 1

      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model_info
          path: model_info.txt

      - name: Upload MLflow tracking data
        uses: actions/upload-artifact@v4
        with:
          name: mlflow_data
          path: |
            mlruns
            mlflow.db
          if-no-files-found: ignore

  deploy:
    needs: validate   
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model_info
          path: .

      - name: Download MLflow tracking data
        uses: actions/download-artifact@v4
        with:
          name: mlflow_data
          path: .

      - name: Check model performance
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python check_threshold.py

      - name: Mock Docker build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
